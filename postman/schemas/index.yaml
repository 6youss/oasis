openapi: 3.0.3
info:
  title: Oasis API
  version: 1.0.0
paths:
  /api/reservations:
    get:
      operationId: getAllOperations
      summary: Get all reservations
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/List'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Reservation'
components:
  schemas:
    List:
      type: object
      properties:
        page_number:
            type: integer
        page_count:
            type: integer
    Reservation:
      type: object
      required:
        - id
        - start_time
        - end_time
        - resource_id
        - customer_id
      properties:
        id:
          type: integer
        start_time:
          type: integer
        end_time:
          type: integer
        resource_id:
          type: integer
        customer_id:
          type: integer
    Error:
      type: object
      required:
        - message
      properties:
        message:
          description: A human readable error message
          type: string


